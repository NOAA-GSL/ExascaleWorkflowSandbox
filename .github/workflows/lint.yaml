# SPDX-License-Identifier: Apache-2.0

name: Lint

on:
  push:
    branches: [ develop, main ]
  pull_request:
    branches: [ develop, main ]
  workflow_dispatch:

jobs:
  lint-check:
    runs-on: ubuntu-latest
    steps:
      -
        name: Checkout repository
        uses: actions/checkout@v4
      -
        name: Format Check
        run:  |
          pip install ruff
          ruff check
          ruff format --check --diff .
