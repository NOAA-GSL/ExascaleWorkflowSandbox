mpi:
  mpi: True
  max_mpi_apps: 2
  mpi_launcher: "srun"
  provider: "slurm"
  cores_per_node: 80
  nodes_per_block: 3
  exclusive: True
  partition: "hercules"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: &common-env
    - "source /apps/systools/hercules/etc/HPC2-lmod.sh"
    - "module purge"
    - "module use /apps/contrib/spack-stack/spack-stack-1.8.0/envs/ue-intel-2021.9.0/install/modulefiles/Core"
    - "module load stack-intel/2021.9.0"
    - "module load stack-intel-oneapi-mpi/2021.9.0"
    - "module load stack-python/3.11.7"
    - "module load jedi-fv3-env"
    - "export CHILTEPIN_MPIF90=$MPIF90"
service:
  mpi: False
  provider: "slurm"
  cores_per_node: 1
  nodes_per_block: 1
  exclusive: False
  partition: "service"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: *common-env
compute:
  mpi: False
  provider: "slurm"
  cores_per_node: 80
  nodes_per_block: 1
  exclusive: True
  partition: "hercules"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: *common-env
gc-mpi:
  endpoint: "{{ mpi_endpoint_id }}"
  mpi: True
  max_mpi_apps: 2
  mpi_launcher: "srun"
  provider: "slurm"
  cores_per_node: 80
  nodes_per_block: 3
  exclusive: True
  partition: "hercules"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: *common-env
gc-service:
  endpoint: "{{ service_endpoint_id }}"
  mpi: False
  provider: "slurm"
  cores_per_node: 1
  nodes_per_block: 1
  exclusive: False
  partition: "service"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: *common-env
gc-compute:
  endpoint: "{{ compute_endpoint_id }}"
  mpi: False
  provider: "slurm"
  cores_per_node: 80
  nodes_per_block: 1
  exclusive: True
  partition: "hercules"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  environment: *common-env
