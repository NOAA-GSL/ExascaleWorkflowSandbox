hera-env: &hera-env
  environment:
    - "source /etc/profile.d/modules.sh"
    - "module purge"
    - "module use /contrib/spack-stack/spack-stack-1.8.0/envs/ue-intel-2021.5.0/install/modulefiles/Core"
    - "module load stack-intel/2021.5.0"
    - "module load stack-intel-oneapi-mpi/2021.5.1"
    - "module load stack-python/3.11.7"
    - "module load jedi-fv3-env"
    - "export CHILTEPIN_MPIF90=$MPIF90"

mpi:
  mpi: True
  max_mpi_apps: 2
  mpi_launcher: "srun"
  provider: "slurm"
  cores_per_node: 40
  nodes_per_block: 3
  exclusive: True
  partition: "hera"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
service:
  mpi: False
  provider: "slurm"
  cores_per_node: 1
  nodes_per_block: 1
  exclusive: False
  partition: "service"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
compute:
  mpi: False
  provider: "slurm"
  cores_per_node: 40
  nodes_per_block: 1
  exclusive: True
  partition: "hera"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
gc-mpi:
  endpoint: "{{ mpi_endpoint_id }}"
  mpi: True
  max_mpi_apps: 2
  mpi_launcher: "srun"
  provider: "slurm"
  cores_per_node: 40
  nodes_per_block: 3
  exclusive: True
  partition: "hera"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
gc-service:
  endpoint: "{{ service_endpoint_id }}"
  mpi: False
  provider: "slurm"
  cores_per_node: 1
  nodes_per_block: 1
  exclusive: False
  partition: "service"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
gc-compute:
  endpoint: "{{ compute_endpoint_id }}"
  mpi: False
  provider: "slurm"
  cores_per_node: 40
  nodes_per_block: 1
  exclusive: True
  partition: "hera"
  account: "gsd-hpcs"
  walltime: "1:00:00"
  <<: *hera-env
