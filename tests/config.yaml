hercules:
  providers:
    -
      type: "flux"
      name: "parallel"
      cores per node: 80
      nodes per block: 3
      partition: "hercules"
      account: "gsd-hpcs"
    -
      type: "htex"
      name: "service"
      cores per node: 1
      nodes per block: 1
      partition: "service"
      account: "gsd-hpcs"
    -
      type: "htex"
      name: "serial"
      cores per node: 80
      nodes per block: 1
      partition: "hercules"
      account: "gsd-hpcs"
  
  environment:
    - "module purge"
    - "module use /work/noaa/epic/role-epic/spack-stack/hercules/spack-stack-1.6.0/envs/unified-env/install/modulefiles/Core"
    - "module load stack-intel/2021.9.0"
    - "module load stack-intel-oneapi-mpi/2021.9.0"
    - "module load stack-python/3.10.13"
    - "module load jedi-fv3-env"
    - "unset I_MPI_PMI_LIBRARY"
    - "export CHILTEPIN_MPIF90=$MPIF90"

