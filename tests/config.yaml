pw:
  providers:
    -
      type: "flux"
      name: "parallel"
      cores per node: 8
      nodes per block: 3
      partition: "parallel"
      account: ""
    -
      type: "htex"
      name: "service"
      cores per node: 1
      nodes per block: 1
      partition: "service"
      account: ""
    -
      type: "htex"
      name: "serial"
      cores per node: 8
      nodes per block: 1
      partition: "serial"
      account: ""

  environment:
    - "module purge"
    - "module unuse /usr/share/Modules/modulefiles"
    - "module unuse /usr/share/modulefiles"
    - "module use /home/Christopher.W.Harrop/spack-stack/envs/unified-dev.mylinux/install/modulefiles/Core"
    - "module load stack-gcc"
    - "module load stack-openmpi"
    - "module load stack-python"
    - "module load jedi-fv3-env"
    - "module load flux-sched"
    - "module load flux-core"
    - "module list"
    - "unset I_MPI_PMI_LIBRARY"
    - "export CHILTEPIN_MPIF90=$MPIF90"
    - "export FLUX_PMI_LIBRARY_PATH=/home/Christopher.W.Harrop/spack-stack/envs/unified-dev.mylinux/install/gcc/11.2.1/flux-core-0.58.0-ixdubhz/lib/flux/libpmi.so"
    - "export OMPI_MCA_btl=self,tcp"
    - "echo FLUX_MODULE_PATH=$FLUX_MODULE_PATH"

